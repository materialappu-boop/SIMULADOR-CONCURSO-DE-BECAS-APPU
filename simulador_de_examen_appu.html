                processEscapes: true
            },

                skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
            },
            startup: {

                    return window.MathJax.startup.defaultPageReady();

        document.head.appendChild(script);

                window.MathJax.typesetPromise()
                    .catch((err) => console.warn("MathJax typeset error: ", err));
            }
        }, 150);

    useEffect(() => {
        triggerMathJax();
    }, [currentView, activeQuestionIndex, examFinished, adminTab, questionForm, activeBannerTab, selectedBannerGrade]);

                    await auth.signInWithCustomToken(__initial_auth_token);

                    await auth.signInAnonymously();

            setLoadingData(false);
        }
        else {

        }

            setUser(u);

        return () => unsubscribe();
    }, []);

    useEffect(() => {
        if (isOfflineMode) {
            const storedExams = localStorage.getItem('appu_exams');

            const storedResults = localStorage.getItem('appu_results');

            let finalQuestions = defaultQuestions;
            let finalResults = [];
            if (storedExams) {
                try {
                    finalExams = JSON.parse(storedExams);
                }
                catch (e) { }

                localStorage.setItem('appu_exams', JSON.stringify(defaultExams));

                    finalQuestions = JSON.parse(storedQuestions);

            setQuestions(finalQuestions);
            setResults(finalResults);
            setLoadingData(false);
            triggerMathJax();
            return;

                examsList.push({ id: doc.id, ...doc.data() });

            triggerMathJax();

            console.error("Error cargando exámenes:", error);

        });
        const unsubscribeQuestions = questionsCollection.onSnapshot((snapshot) => {
            const questionsList = [];
            snapshot.forEach((doc) => {
                questionsList.push({ id: doc.id, ...doc.data() });
            });
            questionsList.sort((a, b) => (a.order || 0) - (b.order || 0));
            setQuestions(questionsList);
            setLoadingData(false);
            triggerMathJax();
        }, (error) => {
            console.error("Error cargando preguntas:", error);
            showToast("Error al sincronizar preguntas.", "error");
            setLoadingData(false);
        });

            const resultsList = [];
            snapshot.forEach((doc) => {
                resultsList.push({ id: doc.id, ...doc.data() });
            });
            setResults(resultsList);
        }, (error) => {
            console.error("Error cargando resultados:", error);
        });

            unsubscribeExams();
            unsubscribeQuestions();
            unsubscribeResults();

            message,
            onConfirm: () => {
                onConfirm();
                setModalConfirm({ show: false, title: '', message: '', onConfirm: null });
            }
        });
    };
    const handleImageUpload = (file, callback) => {
        if (!file)
            return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 800;
                let width = img.width;
                let height = img.height;
                if (width > MAX_WIDTH) {
                    height *= MAX_WIDTH / width;
                    width = MAX_WIDTH;
                }
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                if (ctx) {
                    ctx.drawImage(img, 0, 0, width, height);
                    const base64Str = canvas.toDataURL('image/jpeg', 0.7);
                    callback(base64Str);
                }
            };
            if (e.target && e.target.result) {
                img.src = e.target.result;
            }
        };
        reader.readAsDataURL(file);
    };

            return;

        const rows = results.map(res => [
            `"${res.studentName || ''}"`,
            `"${res.dni || ''}"`,
            `"${res.phone || ''}"`,
            `"${res.school || ''}"`,
            `"${res.grade || ''}"`,
            `"${res.tutor || ''}"`,
            `"${res.examName || ''}"`,
            `"${res.score || ''}"`,
            `"${res.tag || '-'}"`
        ]);
        const csvContent = [headers.join(','), ...rows.map(row => row.join(','))].join('\\n');
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;

        link.click();
        document.body.removeChild(link);

        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 800;
                let width = img.width;
                let height = img.height;
                if (width > MAX_WIDTH) {
                    height *= MAX_WIDTH / width;
                    width = MAX_WIDTH;
                }
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                if (ctx) {
                    ctx.drawImage(img, 0, 0, width, height);
                    const base64Str = canvas.toDataURL('image/jpeg', 0.7);
                    setConverterBase64Result(base64Str);
                    showToast("Imagen convertida a Base64 con éxito.", "success");
                }
            };
            if (event.target && event.target.result) {
                img.src = event.target.result;
            }
        };
        reader.readAsDataURL(file);
    };
